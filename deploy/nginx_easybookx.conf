# EasybookX · Nginx 反向代理
# 放置到 /etc/nginx/conf.d/easybookx.conf（或 sites-available 并软链 sites-enabled）
# 然后： nginx -t && systemctl reload nginx
#
# 上线 HTTPS：装好后运行  certbot --nginx -d your-domain.com
# certbot 会自动改写本文件加上 443 / 证书 / 80→443 跳转。

server {
    listen 80;
    listen [::]:80;
    # 把 your-domain.com 改成你的域名；若暂时只用公网 IP 访问，可填  _  匹配所有
    server_name your-domain.com;

    # 上传体积（银行流水/票据 PDF）放宽到 50M
    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
